<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#000000">
  <meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ with .Site.Params.description }}{{ . }}{{ end }}{{ end }}">
  <meta property="og:title" content="{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} — {{ .Site.Title }}{{ end }}">
  <meta property="og:description" content="{{ with .Description }}{{ . }}{{ else }}{{ with .Site.Params.description }}{{ . }}{{ end }}{{ end }}">
  <meta property="og:type" content="{{ if .IsHome }}website{{ else }}article{{ end }}">
  <meta property="og:url" content="{{ .Site.Params.productionURL }}{{ .RelPermalink }}">
  <meta property="og:image" content="{{ .Site.Params.productionURL }}/logotransparent.png">
  <meta name="twitter:card" content="summary">
  <title>Samuel Horry</title>
  <link rel="preconnect" href="https://fonts.bunny.net">
  <link href="https://fonts.bunny.net/css?family=jetbrains-mono:400,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ "style.css" | relURL }}">
  <link rel="icon" href="{{ "favicon-32x32.png" | relURL }}">
  <script src="{{ "script.js" | relURL }}" defer></script>
</head>

<body>
  <div class="rect">
    {{ partial "header.html" . }}
    <div class="main{{ with .Params.mainClass }} {{ . }}{{ end }}">
      {{ block "main" . }}{{ end }}
    </div>
  </div>
  {{ partial "footer.html" . }}
  <script>
    document.addEventListener('keydown', function(event) {
      switch (event.key) {
        case '1': window.location.href = '/'; break;
        case '2': window.location.href = '/blog/'; break;
        case '3': window.location.href = '/skills/'; break;
        case '4': window.location.href = '/contact/'; break;
      }
    });
  </script>
</body>

</html>
